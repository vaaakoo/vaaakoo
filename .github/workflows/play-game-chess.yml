name: Play Connect 4 Chess

on:
  issues:
    types: [opened] # რეაგირებს მხოლოდ ახალი Issue-ს შექმნაზე

permissions:
  contents: write
  issues: write # საჭიროა რომ Issue ავტომატურად დაიხუროს

jobs:
  play:
    # ეშვება მხოლოდ მაშინ, თუ Issue-ს სათაური იწყება c4-move- ით
    if: startsWith(github.event.issue.title, 'c4-move-')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Make a Move
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: node play-connect4-chess.js
        
      - name: Commit and Push changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add board-chess.json dist/connect4-chess.svg
          git commit -m "Play Connect 4 Chess: ${{ github.event.issue.title }}" || exit 0
          git pull --rebase origin master
          git push

      - name: Close Issue Automatically
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue close ${{ github.event.issue.number }} --comment "Move processed! The board has been updated on the README."
