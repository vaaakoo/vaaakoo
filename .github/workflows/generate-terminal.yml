name: Generate Retro Terminal

on:
  schedule:
    - cron: "0 0 * * *" # ყოველდღიური გაშვება, რომ Action აქტიური დარჩეს
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Generate Terminal SVG
        run: node generate-terminal.js
        
      - name: Commit and Push changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dist/terminal.svg
          git commit -m "chore: update terminal animation" || exit 0
          git push
